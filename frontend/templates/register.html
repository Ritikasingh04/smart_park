{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Register - Smart Parking System</title>
  <link rel="stylesheet" href="{% static 'css/style.css' %}"/>
  <style>
    body{background:linear-gradient(135deg,#f3e8ff 0%,#e0fffe 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:'Segoe UI',sans-serif;padding:20px;}
    .auth-box{background:#fff;border-radius:20px;box-shadow:0 20px 60px rgba(166,74,201,.18);padding:40px;width:100%;max-width:460px;}
    .auth-logo{text-align:center;margin-bottom:24px;}
    .auth-logo-icon{width:52px;height:52px;border-radius:14px;background:linear-gradient(135deg,#A64AC9,#17E9E0);display:flex;align-items:center;justify-content:center;font-size:1.7rem;margin:0 auto 10px;}
    .auth-logo h1{font-size:1.3rem;font-weight:800;color:#1a1a2e;}
  </style>
</head>
<body>
<div class="auth-box">
  <div class="auth-logo">
    <div class="auth-logo-icon">&#x1F17F;</div>
    <h1>Create Your Account</h1>
    <p style="color:#6b7280;font-size:0.85rem;">Join Smart Parking System today</p>
  </div>
  {% if messages %}
  <ul class="messages">{% for m in messages %}<li class="{{ m.tags }}">{{ m }}</li>{% endfor %}</ul>
  {% endif %}
  <form method="post">
    {% csrf_token %}
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">First Name</label>
        <input class="form-control" name="first_name" type="text" placeholder="John"/>
      </div>
      <div class="form-group">
        <label class="form-label">Last Name</label>
        <input class="form-control" name="last_name" type="text" placeholder="Doe"/>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Username *</label>
      <input class="form-control" name="username" type="text" placeholder="Choose a username" required/>
    </div>
    <div class="form-group">
      <label class="form-label">Email *</label>
      <input class="form-control" name="email" type="email" placeholder="your@email.com" required/>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Password *</label>
        <input class="form-control" name="password1" type="password" placeholder="Min 8 chars" required/>
      </div>
      <div class="form-group">
        <label class="form-label">Confirm Password *</label>
        <input class="form-control" name="password2" type="password" placeholder="Repeat password" required/>
      </div>
    </div>
    <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:13px;margin-top:4px;">Create Account &#x2192;</button>
  </form>
  <p style="text-align:center;margin-top:16px;font-size:0.88rem;color:#6b7280;">
    Already have an account? <a href="{% url 'login' %}" style="color:#A64AC9;font-weight:600;">Login</a>
  </p>
  <p style="text-align:center;margin-top:8px;">
    <a href="/" class="btn-back" style="font-size:0.82rem;">&#x2190; Back to Home</a>
  </p>
</div>
</body>
</html>
